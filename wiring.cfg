# =============================================================================
# WIRING — HevOrt 300 AWD
# =============================================================================
# Maps machine functions to board connectors (defined in board.cfg).
# This is the only file that needs changing if connectors are moved.
# =============================================================================

[board_pins wiring]
aliases:
    # -------------------------------------------------------------------------
    # Motion — XY AWD (slots 1–4, TMC5160 SPI)
    # -------------------------------------------------------------------------
    X_STEP=M1_STEP,  X_DIR=M1_DIR,  X_EN=M1_EN,  X_CS=M1_CS,
    Y_STEP=M2_STEP,  Y_DIR=M2_DIR,  Y_EN=M2_EN,  Y_CS=M2_CS,
    X1_STEP=M3_STEP, X1_DIR=M3_DIR, X1_EN=M3_EN, X1_CS=M3_CS,
    Y1_STEP=M4_STEP, Y1_DIR=M4_DIR, Y1_EN=M4_EN, Y1_CS=M4_CS,

    # -------------------------------------------------------------------------
    # Motion — Z triple (slots 5–7, TMC2208 UART)
    # -------------------------------------------------------------------------
    Z1_STEP=M5_STEP, Z1_DIR=M5_DIR, Z1_EN=M5_EN, Z1_UART=M5_UART,
    Z_STEP=M6_STEP,  Z_DIR=M6_DIR,  Z_EN=M6_EN,  Z_UART=M6_UART,
    Z2_STEP=M7_STEP, Z2_DIR=M7_DIR, Z2_EN=M7_EN, Z2_UART=M7_UART,

    # -------------------------------------------------------------------------
    # Motion — Extruder (E0, TMC2208 UART)
    # -------------------------------------------------------------------------
    E_STEP=E0_STEP, E_DIR=E0_DIR, E_EN=E0_EN, E_UART=E0_UART,

    # -------------------------------------------------------------------------
    # Endstops
    # -------------------------------------------------------------------------
    X_STOP=STOP_2,
    Y_STOP=STOP_5,

    # -------------------------------------------------------------------------
    # Heaters
    # -------------------------------------------------------------------------
    HOTEND_HEATER=HE0,
    BED_HEATER=BED,

    # -------------------------------------------------------------------------
    # Thermistors
    # -------------------------------------------------------------------------
    HOTEND_TEMP=T0,
    BED_TEMP=T1,
    CHAMBER_TEMP=T2,

    # -------------------------------------------------------------------------
    # Fans
    # -------------------------------------------------------------------------
    PART_FAN=STOP_4,    # PG12 — endstop header used as PWM fan output
    RADIATOR_FAN=FAN0,
    PUMP_FAN=FAN1,

    # -------------------------------------------------------------------------
    # Lighting
    # -------------------------------------------------------------------------
    LIGHTS_PIN=FAN3
