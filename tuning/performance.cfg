# =============================================================================
# TUNING PROFILE — Performance (currently active)
# =============================================================================
# Applied at every PRINT_START via _APPLY_TUNING.
# To switch to safe/baseline settings, comment this include in printer.cfg
# and uncomment tuning/baseline.cfg instead.
# =============================================================================

[gcode_macro _APPLY_TUNING]
description: Apply performance tuning at print start
gcode:
    SET_VELOCITY_LIMIT VELOCITY=800 ACCEL=70000
    SET_PRESSURE_ADVANCE ADVANCE=0.034 SMOOTH_TIME=0.040
