# =============================================================================
# TUNING PROFILE — Baseline (safe / conservative)
# =============================================================================
# Applied at every PRINT_START via _APPLY_TUNING.
# To activate: comment out tuning/performance.cfg in printer.cfg,
# uncomment this file instead.
# =============================================================================

[gcode_macro _APPLY_TUNING]
description: Apply baseline/safe tuning at print start
gcode:
    SET_VELOCITY_LIMIT VELOCITY=300 ACCEL=5000
    SET_PRESSURE_ADVANCE ADVANCE=0.034 SMOOTH_TIME=0.040
