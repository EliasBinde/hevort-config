# =============================================================================
# BOARD — BTT Octopus Pro V1.1 (STM32F446)
# =============================================================================
# Single source of truth for all physical pin assignments.
# No raw MCU pin names (PA0, PG1, etc.) should appear outside this file.
# All other configs reference the logical aliases defined here.
# =============================================================================

[board_pins octopus_pro_v1]
aliases:
    # -------------------------------------------------------------------------
    # MOTOR SLOTS — Steppers
    # -------------------------------------------------------------------------
    # Slot 1: X  (back right)  — TMC5160 SPI
    X_STEP=PG0,   X_DIR=PG1,   X_EN=PF15,  X_CS=PD11,
    # Slot 2: Y  (front right) — TMC5160 SPI
    Y_STEP=PF9,   Y_DIR=PF10,  Y_EN=PG2,   Y_CS=PF2,
    # Slot 3: X1 (front left)  — TMC5160 SPI
    X1_STEP=PF11, X1_DIR=PG3,  X1_EN=PG5,  X1_CS=PC6,
    # Slot 4: Y1 (back left)   — TMC5160 SPI
    Y1_STEP=PG4,  Y1_DIR=PC1,  Y1_EN=PA0,  Y1_CS=PC7,
    # Slot 5: Z1 (rear center) — TMC2208 UART
    Z1_STEP=PC13, Z1_DIR=PF0,  Z1_EN=PF1,  Z1_UART=PE4,
    # Slot 6: Z  (front left)  — TMC2208 UART
    Z_STEP=PE2,   Z_DIR=PE3,   Z_EN=PD4,   Z_UART=PE1,
    # Slot 7: Z2 (front right) — TMC2208 UART
    Z2_STEP=PE6,  Z2_DIR=PA14, Z2_EN=PE0,  Z2_UART=PD3,
    # Slot E0: Extruder         — TMC2208 UART
    E_STEP=PF13,  E_DIR=PF12,  E_EN=PF14,  E_UART=PC4,
    # Slot E1: spare
    E1_STEP=PE8,  E1_DIR=PE7,  E1_EN=PE9,  E1_UART=PD6,
    # Slot E2: spare
    E2_STEP=PB1,  E2_DIR=PF4,  E2_EN=PB2,  E2_UART=PD7,
    # Slot E3: spare
    E3_STEP=PG7,  E3_DIR=PG6,  E3_EN=PG8,  E3_UART=PC15,

    # -------------------------------------------------------------------------
    # ENDSTOPS — STOP_0 … STOP_7 (all 8 headers)
    # -------------------------------------------------------------------------
    STOP_0=PG6,
    STOP_1=PG9,
    STOP_2=PG10,    # X_STOP (in use)
    STOP_3=PG11,
    STOP_4=PG12,
    STOP_5=PG13,    # Y_STOP (in use)
    STOP_6=PG14,
    STOP_7=PG15,
    # Logical aliases for active endstops
    X_STOP=PG10,
    Y_STOP=PG13,

    # -------------------------------------------------------------------------
    # HEATERS — HE0 … HE3
    # -------------------------------------------------------------------------
    HE0_PIN=PA2,    # HOTEND_HEATER (in use)
    HE1_PIN=PA3,    # spare
    HE2_PIN=PB0,    # spare
    HE3_PIN=PB11,   # spare
    # Logical aliases for active heaters
    HOTEND_HEATER=PA2,
    BED_HEATER=PA1,

    # -------------------------------------------------------------------------
    # THERMISTORS — T0 … T4
    # -------------------------------------------------------------------------
    T0_PIN=PF3,     # HOTEND_TEMP (in use)
    T1_PIN=PF4,     # BED_TEMP (in use)
    T2_PIN=PF5,     # CHAMBER_TEMP (in use)
    T3_PIN=PF6,     # spare
    T4_PIN=PF7,     # spare
    # Logical aliases for active thermistors
    HOTEND_TEMP=PF3,
    BED_TEMP=PF4,
    CHAMBER_TEMP=PF5,

    # -------------------------------------------------------------------------
    # FANS — FAN0 … FAN5  (FAN6/FAN7 are always-on, no GPIO)
    # -------------------------------------------------------------------------
    FAN0_PIN=PA8,   # RADIATOR_FAN (in use)
    FAN1_PIN=PE5,   # PUMP_FAN (in use)
    FAN2_PIN=PD12,  # spare
    FAN3_PIN=PD13,  # LIGHTS_PIN repurposed — actual fan header
    FAN4_PIN=PD14,  # spare
    FAN5_PIN=PD15,  # spare
    # Note: FAN0 on Octopus Pro is the "part cooling" header = PG12 on some docs;
    # verify with silk-screen. Below is the known working assignment:
    PART_FAN=PG12,
    RADIATOR_FAN=PA8,
    PUMP_FAN=PE5,

    # -------------------------------------------------------------------------
    # OUTPUT / MISC
    # -------------------------------------------------------------------------
    LIGHTS_PIN=PD13,
    # Neopixel / RGB header
    RGB_PIN=PB10,
    # Power supply on/off (PS_ON — active low on most PSUs)
    PS_ON_PIN=PE11,
    # Voltage/power-loss detection input
    POWER_DET_PIN=PC0,

    # -------------------------------------------------------------------------
    # PROBE HEADER  (Signal / GND / VCC — e.g. BLTouch, CRTouch, Klicky)
    # Cartographer is on CAN; these are the 5V probe header pins
    # -------------------------------------------------------------------------
    PROBE_PIN=PB7,
    PROBE_SIG2=PB6,

    # -------------------------------------------------------------------------
    # I2C  (shared with EXP1/2 header on some variants)
    # -------------------------------------------------------------------------
    I2C_SCL=PB8,
    I2C_SDA=PB9,

    # -------------------------------------------------------------------------
    # CAN BUS  (via TJA1050 transceiver on-board)
    # -------------------------------------------------------------------------
    CAN_RX=PD0,
    CAN_TX=PD1,

    # -------------------------------------------------------------------------
    # SPI HEADER  (MAX31865 / external SPI devices)
    # -------------------------------------------------------------------------
    SPI_MISO=PA6,
    SPI_SCK=PA5,
    SPI_MOSI=PA7,
    SPI_CS=PF8,

    # -------------------------------------------------------------------------
    # EXP1 / EXP2 LCD CONNECTOR PINS
    # -------------------------------------------------------------------------
    EXP1_1=PE8,  EXP1_2=PE7,
    EXP1_3=PE9,  EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,
    EXP1_7=PE14, EXP1_8=PE15,
    EXP2_1=PA6,  EXP2_2=PA5,
    EXP2_3=PB1,  EXP2_4=PA4,
    EXP2_5=PB2,  EXP2_6=PA7,
    EXP2_7=PC15, EXP2_8=PB0,

    # -------------------------------------------------------------------------
    # SPARE GPIO  (accessible via unpopulated headers or solder pads)
    # -------------------------------------------------------------------------
    GPIO_PA11=PA11,
    GPIO_PA12=PA12,
    GPIO_PB14=PB14,
    GPIO_PB15=PB15
