# =============================================================================
# BOARD — BTT Octopus Pro V1.1 (STM32F446)
# =============================================================================
# Board-level pin map only. Aliases match the silk-screen labels on the PCB.
# No machine-specific wiring here — that belongs in wiring.cfg.
# No raw MCU pin names (PA0, PG1, …) should appear outside this file.
# =============================================================================

[board_pins octopus_pro_v1]
aliases:
    # -------------------------------------------------------------------------
    # MOTOR SLOTS 1–7 + EXTRUDER SLOTS E0–E3
    # Each slot has STEP/DIR/EN + one 4th-signal pad (IO).
    # The IO pin is the same physical pad used as SPI CS or UART PDN
    # depending on the driver fitted — mode is set in wiring.cfg.
    # -------------------------------------------------------------------------
    M1_STEP=PG0,  M1_DIR=PG1,  M1_EN=PF15, M1_IO=PD11,
    M2_STEP=PF9,  M2_DIR=PF10, M2_EN=PG2,  M2_IO=PF2,
    M3_STEP=PF11, M3_DIR=PG3,  M3_EN=PG5,  M3_IO=PC6,
    M4_STEP=PG4,  M4_DIR=PC1,  M4_EN=PA0,  M4_IO=PC7,
    M5_STEP=PC13, M5_DIR=PF0,  M5_EN=PF1,  M5_IO=PE4,
    M6_STEP=PE2,  M6_DIR=PE3,  M6_EN=PD4,  M6_IO=PE1,
    M7_STEP=PE6,  M7_DIR=PA14, M7_EN=PE0,  M7_IO=PD3,
    E0_STEP=PF13, E0_DIR=PF12, E0_EN=PF14, E0_IO=PC4,
    E1_STEP=PE8,  E1_DIR=PE7,  E1_EN=PE9,  E1_IO=PD6,
    E2_STEP=PB1,  E2_DIR=PF4,  E2_EN=PB2,  E2_IO=PD7,
    E3_STEP=PG7,  E3_DIR=PG6,  E3_EN=PG8,  E3_IO=PC15,

    # -------------------------------------------------------------------------
    # ENDSTOPS — STOP_0 … STOP_7
    # -------------------------------------------------------------------------
    STOP_0=PG6,
    STOP_1=PG9,
    STOP_2=PG10,
    STOP_3=PG11,
    STOP_4=PG12,
    STOP_5=PG13,
    STOP_6=PG14,
    STOP_7=PG15,

    # -------------------------------------------------------------------------
    # HEATERS — HE0 … HE3  +  BED
    # -------------------------------------------------------------------------
    HE0=PA2,
    HE1=PA3,
    HE2=PB0,
    HE3=PB11,
    BED=PA1,

    # -------------------------------------------------------------------------
    # THERMISTORS — T0 … T4
    # -------------------------------------------------------------------------
    T0=PF3,
    T1=PF4,
    T2=PF5,
    T3=PF6,
    T4=PF7,

    # -------------------------------------------------------------------------
    # FANS — FAN0 … FAN5  (FAN6/FAN7 are always-on, no GPIO)
    # -------------------------------------------------------------------------
    FAN0=PA8,
    FAN1=PE5,
    FAN2=PD12,
    FAN3=PD13,
    FAN4=PD14,
    FAN5=PD15,

    # -------------------------------------------------------------------------
    # MISC OUTPUTS / INPUTS
    # -------------------------------------------------------------------------
    RGB=PB10,
    PS_ON=PE11,
    POWER_DET=PC0,

    # -------------------------------------------------------------------------
    # PROBE HEADER
    # -------------------------------------------------------------------------
    PROBE=PB7,
    PROBE2=PB6,

    # -------------------------------------------------------------------------
    # I2C
    # -------------------------------------------------------------------------
    I2C_SCL=PB8,
    I2C_SDA=PB9,

    # -------------------------------------------------------------------------
    # CAN BUS
    # -------------------------------------------------------------------------
    CAN_RX=PD0,
    CAN_TX=PD1,

    # -------------------------------------------------------------------------
    # SPI HEADER  (MAX31865 / external SPI)
    # -------------------------------------------------------------------------
    SPI_MISO=PA6,
    SPI_SCK=PA5,
    SPI_MOSI=PA7,
    SPI_CS=PF8,

    # -------------------------------------------------------------------------
    # EXP1 / EXP2 LCD CONNECTORS
    # -------------------------------------------------------------------------
    EXP1_1=PE8,  EXP1_2=PE7,
    EXP1_3=PE9,  EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,
    EXP1_7=PE14, EXP1_8=PE15,
    EXP2_1=PA6,  EXP2_2=PA5,
    EXP2_3=PB1,  EXP2_4=PA4,
    EXP2_5=PB2,  EXP2_6=PA7,
    EXP2_7=PC15, EXP2_8=PB0,

    # -------------------------------------------------------------------------
    # SPARE GPIO
    # -------------------------------------------------------------------------
    GPIO_PA11=PA11,
    GPIO_PA12=PA12,
    GPIO_PB14=PB14,
    GPIO_PB15=PB15
