# =============================================================================
# KINEMATICS — HevOrt 300 AWD CoreXY / Triple Z (SFU1204 ballscrews)
# =============================================================================

[printer]
kinematics: corexy
max_velocity: 800
max_accel: 70000
max_z_velocity: 20
max_z_accel: 250
square_corner_velocity: 5.0

# -----------------------------------------------------------------------------
# XY — AWD (4 motors)
# Back Right → X | Back Left → Y1 | Front Left → X1 | Front Right → Y
# -----------------------------------------------------------------------------

[stepper_x]
step_pin: X_STEP
dir_pin: !X_DIR
enable_pin: !X_EN
microsteps: 16
rotation_distance: 40
endstop_pin: ^X_STOP
position_endstop: 0
position_max: 300
homing_speed: 150

[stepper_y]
step_pin: Y_STEP
dir_pin: !Y_DIR
enable_pin: !Y_EN
microsteps: 16
rotation_distance: 40
endstop_pin: Y_STOP
position_endstop: 0
position_max: 290
homing_speed: 150

[stepper_x1]
step_pin: X1_STEP
dir_pin: !X1_DIR
enable_pin: !X1_EN
microsteps: 16
rotation_distance: 40

[stepper_y1]
step_pin: Y1_STEP
dir_pin: !Y1_DIR
enable_pin: !Y1_EN
microsteps: 16
rotation_distance: 40

# -----------------------------------------------------------------------------
# Z — Triple Z (4mm lead, SFU1204 ballscrews)
# Front Left → Z | Rear Center → Z1 | Front Right → Z2
# -----------------------------------------------------------------------------

[stepper_z]
step_pin: Z_STEP
dir_pin: !Z_DIR
enable_pin: !Z_EN
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0

[stepper_z1]
step_pin: Z1_STEP
dir_pin: !Z1_DIR
enable_pin: !Z1_EN
microsteps: 16
rotation_distance: 4

[stepper_z2]
step_pin: Z2_STEP
dir_pin: !Z2_DIR
enable_pin: !Z2_EN
microsteps: 16
rotation_distance: 4

# -----------------------------------------------------------------------------
# Z TILT — triple screw positions (mm from origin)
# -----------------------------------------------------------------------------

[z_tilt]
z_positions:
    -22.940, -10.300
    153.268, 317.910
    329.476, -10.300
points:
    40,  0
    150, 210
    260, 0
speed: 200
horizontal_move_z: 15
retries: 2
retry_tolerance: 0.01
