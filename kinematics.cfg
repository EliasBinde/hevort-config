# =============================================================================
# KINEMATICS — Hevort AWD CoreXY / Triple Z
# =============================================================================

[printer]
kinematics: corexy
max_velocity: 800
max_accel: 70000
max_z_velocity: 20
max_z_accel: 250
square_corner_velocity: 5.0

# -----------------------------------------------------------------------------
# XY — AWD (4 motors)
# Slot 1 Back Right  → X
# Slot 2 Front Left  → X1
# Slot 3 Back Left   → Y1
# Slot 4 Front Right → Y
# -----------------------------------------------------------------------------

[stepper_x]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: ^PG10
position_endstop: 0
position_max: 300
homing_speed: 150

[stepper_y]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 40
endstop_pin: PG13
position_endstop: 0
position_max: 290
homing_speed: 150

[stepper_x1]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 40

[stepper_y1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 40

# -----------------------------------------------------------------------------
# Z — Triple Z (4mm lead screws)
# stepper_z  = Front Left  (slot 6)
# stepper_z1 = Rear Center (slot 5)
# stepper_z2 = Front Right (slot 7)
# -----------------------------------------------------------------------------

[stepper_z]
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0

[stepper_z1]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 4

[stepper_z2]
step_pin: PE6
dir_pin: !PA14
enable_pin: !PE0
microsteps: 16
rotation_distance: 4

# -----------------------------------------------------------------------------
# Z TILT
# -----------------------------------------------------------------------------

[z_tilt]
z_positions:
    -22.940, -10.300
    153.268, 317.910
    329.476, -10.300
points:
    40,  0
    150, 210
    260, 0
speed: 200
horizontal_move_z: 15
retries: 2
retry_tolerance: 0.01
