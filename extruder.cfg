# =============================================================================
# EXTRUDER — VZ-HextrudORT / Goliath watercooled / PT1000
# =============================================================================

[extruder]
step_pin: E_STEP
dir_pin: !E_DIR
enable_pin: !E_EN
microsteps: 16
rotation_distance: 5.73
nozzle_diameter: 0.600
filament_diameter: 1.750
heater_pin: HOTEND_HEATER
sensor_pin: HOTEND_TEMP
sensor_type: PT1000
min_temp: -20
max_temp: 500
min_extrude_temp: 170
max_extrude_only_distance: 200
max_extrude_cross_section: 5
pressure_advance: 0.034
pressure_advance_smooth_time: 0.040
