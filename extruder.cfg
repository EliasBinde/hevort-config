# =============================================================================
# EXTRUDER — VZ-HextrudORT / Goliath / PT1000
# =============================================================================

[extruder]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 5.73
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA2
sensor_pin: PF3
sensor_type: PT1000
min_temp: -20
max_temp: 500
min_extrude_temp: 170
max_extrude_only_distance: 200
max_extrude_cross_section: 3.5
pressure_advance: 0.034
pressure_advance_smooth_time: 0.040
