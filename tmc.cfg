# =============================================================================
# TMC DRIVERS
# =============================================================================

# -----------------------------------------------------------------------------
# TMC5160 — XY AWD (spreadCycle, high current)
# -----------------------------------------------------------------------------

[tmc5160 stepper_x]
cs_pin: PD11
spi_bus: spi1
run_current: 2.1
sense_resistor: 0.075
stealthchop_threshold: 0
driver_TBL: 3
driver_TOFF: 8
driver_HSTRT: 2
driver_HEND: 5
driver_TPFD: 0

[tmc5160 stepper_y]
cs_pin: PF2
spi_bus: spi1
run_current: 2.1
sense_resistor: 0.075
stealthchop_threshold: 0
driver_TBL: 3
driver_TOFF: 8
driver_HSTRT: 2
driver_HEND: 5
driver_TPFD: 0

[tmc5160 stepper_x1]
cs_pin: PC6
spi_bus: spi1
run_current: 2.1
sense_resistor: 0.075
stealthchop_threshold: 0
driver_TBL: 3
driver_TOFF: 8
driver_HSTRT: 2
driver_HEND: 5
driver_TPFD: 0

[tmc5160 stepper_y1]
cs_pin: PC7
spi_bus: spi1
run_current: 2.1
sense_resistor: 0.075
stealthchop_threshold: 0
driver_TBL: 3
driver_TOFF: 8
driver_HSTRT: 2
driver_HEND: 5
driver_TPFD: 0

# -----------------------------------------------------------------------------
# TMC2208 — Extruder + Z
# -----------------------------------------------------------------------------

[tmc2208 extruder]
uart_pin: PC4
run_current: 0.80
hold_current: 0.40
stealthchop_threshold: 0

[tmc2208 stepper_z]
uart_pin: PE1
run_current: 0.70
hold_current: 0.45
stealthchop_threshold: 0

[tmc2208 stepper_z1]
uart_pin: PE4
run_current: 0.70
hold_current: 0.45
stealthchop_threshold: 0

[tmc2208 stepper_z2]
uart_pin: PD3
run_current: 0.70
hold_current: 0.45
stealthchop_threshold: 0
