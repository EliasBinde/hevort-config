# =============================================================================
# TMC DRIVERS
# =============================================================================

# -----------------------------------------------------------------------------
# TMC5160 — XY AWD (spreadCycle, SPI, high current)
# Chopper tuned: TBL=3 TOFF=8 HSTRT=2 HEND=5 TPFD=0
# -----------------------------------------------------------------------------

[tmc5160 stepper_x]
cs_pin: X_CS
spi_bus: spi1
run_current: 2.1
sense_resistor: 0.075
stealthchop_threshold: 0
driver_TBL: 3
driver_TOFF: 8
driver_HSTRT: 2
driver_HEND: 5
driver_TPFD: 0

[tmc5160 stepper_y]
cs_pin: Y_CS
spi_bus: spi1
run_current: 2.1
sense_resistor: 0.075
stealthchop_threshold: 0
driver_TBL: 3
driver_TOFF: 8
driver_HSTRT: 2
driver_HEND: 5
driver_TPFD: 0

[tmc5160 stepper_x1]
cs_pin: X1_CS
spi_bus: spi1
run_current: 2.1
sense_resistor: 0.075
stealthchop_threshold: 0
driver_TBL: 3
driver_TOFF: 8
driver_HSTRT: 2
driver_HEND: 5
driver_TPFD: 0

[tmc5160 stepper_y1]
cs_pin: Y1_CS
spi_bus: spi1
run_current: 2.1
sense_resistor: 0.075
stealthchop_threshold: 0
driver_TBL: 3
driver_TOFF: 8
driver_HSTRT: 2
driver_HEND: 5
driver_TPFD: 0

# -----------------------------------------------------------------------------
# TMC2208 — Extruder + Z (UART)
# -----------------------------------------------------------------------------

[tmc2208 extruder]
uart_pin: E_UART
run_current: 0.80
hold_current: 0.40
stealthchop_threshold: 0

[tmc2208 stepper_z]
uart_pin: Z_UART
run_current: 0.70
hold_current: 0.45
stealthchop_threshold: 0

[tmc2208 stepper_z1]
uart_pin: Z1_UART
run_current: 0.70
hold_current: 0.45
stealthchop_threshold: 0

[tmc2208 stepper_z2]
uart_pin: Z2_UART
run_current: 0.70
hold_current: 0.45
stealthchop_threshold: 0
