# =============================================================================
# VARIABLES — Centralized tunable values
# =============================================================================
# Values here are accessible in all macros via:
#   {% set cfg = printer["gcode_macro _CONFIG"] %}
#   cfg.probe_temp_offset, cfg.purge_wait_offset, etc.
# =============================================================================

[gcode_macro _CONFIG]

# --- Temperature staging ---
variable_probe_temp_offset: 50      # degrees below print temp during homing/mesh
variable_purge_wait_offset: 15      # degrees below print temp before purge line

# --- Park position ---
variable_park_x: 150
variable_park_y: 150
variable_z_hop: 10

gcode: # intentionally empty
