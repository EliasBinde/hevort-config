# =============================================================================
# FANS
# =============================================================================

# Watercooling pump — runs when hotend is active, 2 min idle timeout
[controller_fan pump]
pin: PUMP_FAN
cycle_time: 0.01
fan_speed: 1.0
idle_timeout: 120
heater: extruder

# Watercooling radiator — runs when hotend is active, 1 min idle timeout
[controller_fan radiator]
pin: RADIATOR_FAN
fan_speed: 1.0
idle_timeout: 60
heater: extruder

# Part cooling — CPAP
[fan]
pin: PART_FAN
kick_start_time: 0.3
off_below: 0.2
cycle_time: 0.0003

