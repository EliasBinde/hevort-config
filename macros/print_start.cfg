# =============================================================================
# PRINT_START
# =============================================================================
# Slicer start gcode should only contain:
#   PRINT_START BED_TEMP=[bed_temperature_initial_layer_single] NOZZLE_TEMP=[nozzle_temperature_initial_layer]

[gcode_macro PRINT_START]
gcode:
    {% set bed_temp    = params.BED_TEMP    | int %}
    {% set nozzle_temp = params.NOZZLE_TEMP | int %}
    {% set cfg         = printer["gcode_macro _CONFIG"] %}

    # Heat hotend to probing temp (overrides slicer auto-preheat before it reaches full temp)
    M104 S{nozzle_temp - cfg.probe_temp_offset}
    # Wait for bed
    M190 S{bed_temp}
    # Home (conditional — skips if already homed)
    _CG28
    # Level gantry and re-home Z
    Z_TILT_ADJUST
    G28 Z
    # Adaptive bed mesh
    BED_MESH_CALIBRATE ADAPTIVE=1
    # Park near print area while heating to purge temp
    SMART_PARK
    # Wait until just below print temp (heats remaining degrees during purge)
    M109 S{nozzle_temp - cfg.purge_wait_offset}
    # Apply tuning profile (performance or baseline)
    _APPLY_TUNING
    # Draw HevOrt logo purge
    HEVORT_PURGE
